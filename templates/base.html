{{define "base"}}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body hx-boost="true">
  {{if .Authenticated}}
  <header class="container">
    <nav>
      <ul>
        <li><strong>SESystem</strong></li>
      </ul>
      <ul class="nav-links">
        <li><a href="/jobs" class="{{if eq .CurrentPage "jobs"}}contrast{{end}}">Jobs</a></li>
        <li><a href="/clients" class="{{if eq .CurrentPage "clients"}}contrast{{end}}">Clients</a></li>
        <li><a href="/receipts" class="{{if eq .CurrentPage "receipts"}}contrast{{end}}">Receipts</a></li>
        <li><a href="/spreadsheets" class="{{if eq .CurrentPage "spreadsheets"}}contrast{{end}}">Spreadsheets</a></li>
        {{if .IsAdmin}}
        <li><a href="/finances" class="{{if eq .CurrentPage "finances"}}contrast{{end}}">Finances</a></li>
        <li><a href="/users" class="{{if eq .CurrentPage "users"}}contrast{{end}}">Users</a></li>
        {{end}}
        <li>
          <form action="/logout" method="post">
            <button class="secondary outline">Logout</button>
          </form>
        </li>
      </ul>
    </nav>
  </header>
  {{end}}

  <main class="container">
    {{if .Flash}}
    <article class="flash">{{.Flash}}</article>
    {{end}}
    {{template "content" .}}
  </main>

</body>
</html>
{{end}}
